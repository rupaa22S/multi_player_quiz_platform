<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz – QuizBlast</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="toast-container"></div>

  <div class="page">
    <nav>
      <a href="/" class="logo">Quiz<span>Blast</span></a>
      <span class="badge badge-cyan" id="quiz-badge">⏳ Waiting</span>
    </nav>

    <div class="container" style="width:100%;max-width:700px">

      <!-- Waiting screen -->
      <div id="waiting-screen" class="card animate-in text-center">
        <div class="waiting-screen">
          <div class="pulse-icon">🎮</div>
          <h2>You're in! Get Ready.</h2>
          <p class="text-muted mt-2" id="waiting-info">
            Waiting for the admin to start the quiz…
          </p>
          <div class="mt-3">
            <span class="badge badge-yellow" id="room-code-badge">Room: ------</span>
          </div>
        </div>
      </div>

      <!-- Quiz screen (hidden until started) -->
      <div id="quiz-screen" class="hidden animate-in">
        <div class="flex-between mb-2">
          <h2 id="quiz-title">Quiz</h2>
          <span class="badge badge-green">▶ Live</span>
        </div>

        <!-- Progress -->
        <div class="flex-between mb-1">
          <span class="text-muted" style="font-size:.85rem">Progress</span>
          <span id="progress-label" class="text-yellow" style="font-weight:700;font-size:.85rem">0 / 0 answered</span>
        </div>
        <div class="progress-wrap mb-3">
          <div class="progress-bar" id="quiz-progress-bar" style="width:0%"></div>
        </div>

        <!-- Questions container -->
        <div id="questions-container"></div>

        <!-- Submit button -->
        <button class="btn btn-primary btn-full mt-3" id="submit-btn" onclick="submitAllAnswers()">
          ✅ Submit All Answers
        </button>
      </div>

      <!-- Submitted screen -->
      <div id="submitted-screen" class="hidden animate-in">
        <div class="card text-center">
          <div class="waiting-screen">
            <div style="font-size:4rem">🎉</div>
            <h2>Answers Submitted!</h2>
            <p class="text-muted mt-2">Waiting for the admin to end the quiz…</p>
            <div class="stats-grid mt-3">
              <div class="stat-box">
                <div class="stat-value text-green" id="result-score">–</div>
                <div class="stat-label">Score</div>
              </div>
              <div class="stat-box">
                <div class="stat-value" id="result-correct">–</div>
                <div class="stat-label">Correct</div>
              </div>
              <div class="stat-box">
                <div class="stat-value" id="result-total">–</div>
                <div class="stat-label">Total</div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="/static/script.js"></script>
  <script>
    const params   = new URLSearchParams(window.location.search);
    const roomCode = params.get('room') || sessionStorage.getItem('room_code');
    const userId   = parseInt(params.get('user') || sessionStorage.getItem('user_id'));
    const userName = sessionStorage.getItem('user_name') || 'Player';

    let ws = null;
    let questions = [];
    let userAnswers = {}; // question_id -> answer string

    window.addEventListener('DOMContentLoaded', () => {
      if (!roomCode || !userId) {
        showToast('Session expired. Please join again.', 'error');
        setTimeout(() => window.location.href = '/', 1500);
        return;
      }
      document.getElementById('room-code-badge').textContent = `Room: ${roomCode}`;
      connectWebSocket();
    });

    // ── WebSocket ─────────────────────────────────────────
    function connectWebSocket() {
      const wsUrl = `ws://${location.host}/ws/${roomCode}?user_id=${userId}&user_name=${encodeURIComponent(userName)}&is_admin=false`;
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        setInterval(() => ws.readyState === 1 && ws.send(JSON.stringify({event:'ping'})), 25000);
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.event === 'quiz_started') {
          showToast('Quiz started! Good luck! 🚀', 'success');
          startQuiz(msg.questions);
        }

        if (msg.event === 'quiz_ended') {
          // Redirect to results
          window.location.href = `/result?room=${roomCode}&user=${userId}`;
        }

        if (msg.event === 'kicked') {
          showToast('You were removed from the room by the admin.', 'error');
          setTimeout(() => window.location.href = '/', 2000);
        }
      };

      ws.onclose = () => {
        // Don't show error if already submitted/redirecting
        if (!document.getElementById('submitted-screen').classList.contains('hidden')) return;
        showToast('Connection lost. Please refresh.', 'error');
      };
    }

    // ── Start quiz ────────────────────────────────────────
    function startQuiz(qs) {
      questions = qs;
      document.getElementById('waiting-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      document.getElementById('quiz-badge').textContent = '▶ Live';
      document.getElementById('quiz-badge').className = 'badge badge-green';
      document.getElementById('quiz-title').textContent = `Quiz – ${roomCode}`;
      document.getElementById('result-total').textContent = qs.length;

      renderQuestions(qs);
      updateProgress();
    }

    function renderQuestions(qs) {
      const container = document.getElementById('questions-container');
      container.innerHTML = qs.map((q, i) => {
        let answerHtml = '';

        if (q.type === 'mcq') {
          const letters = ['A','B','C','D'];
          answerHtml = `<div class="options">` +
            q.options.map((opt, j) => `
              <button class="option-btn" data-qid="${q.id}" data-value="${opt}"
                onclick="selectOption(this, ${q.id}, '${opt.replace(/'/g,"\\'")}')">
                <span class="option-letter">${letters[j]}</span>
                <span>${opt}</span>
              </button>
            `).join('') +
          `</div>`;
        } else {
          answerHtml = `
            <input type="text" class="blank-input" id="blank-${q.id}"
              placeholder="Type your answer here…"
              oninput="recordBlank(${q.id}, this.value)" />
          `;
        }

        return `
          <div class="question-card" id="qcard-${q.id}">
            <div class="question-number">Question ${i + 1} of ${qs.length}</div>
            <div class="question-text">${q.question_text}</div>
            ${answerHtml}
          </div>
        `;
      }).join('');
    }

    function selectOption(btn, qid, value) {
      // Deselect all options for this question
      document.querySelectorAll(`[data-qid="${qid}"]`).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      userAnswers[qid] = value;

      // Mark card as answered
      document.getElementById(`qcard-${qid}`).classList.add('answered');
      updateProgress();
    }

    function recordBlank(qid, value) {
      if (value.trim()) {
        userAnswers[qid] = value.trim();
        document.getElementById(`qcard-${qid}`).classList.add('answered');
      } else {
        delete userAnswers[qid];
        document.getElementById(`qcard-${qid}`).classList.remove('answered');
      }
      updateProgress();
    }

    function updateProgress() {
      const answered = Object.keys(userAnswers).length;
      const total = questions.length;
      const pct = total > 0 ? (answered / total) * 100 : 0;
      document.getElementById('quiz-progress-bar').style.width = pct + '%';
      document.getElementById('progress-label').textContent = `${answered} / ${total} answered`;
    }

    // ── Submit all answers ────────────────────────────────
    async function submitAllAnswers() {
      const unanswered = questions.filter(q => !userAnswers[q.id]);
      if (unanswered.length > 0) {
        if (!confirm(`You have ${unanswered.length} unanswered question(s). Submit anyway?`)) return;
        // Fill blanks with empty string for unanswered
        unanswered.forEach(q => { if (!userAnswers[q.id]) userAnswers[q.id] = ''; });
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Submitting…';

      const answersArray = questions.map(q => ({
        question_id: q.id,
        answer: userAnswers[q.id] || '',
      }));

      try {
        const res = await fetch('/submit-answers', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({user_id: userId, room_code: roomCode, answers: answersArray})
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail);

        // Show submitted screen
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('submitted-screen').classList.remove('hidden');
        document.getElementById('result-score').textContent = data.score;
        document.getElementById('result-correct').textContent = data.correct;
        document.getElementById('result-total').textContent = data.total;

        showToast('Answers submitted! Wait for the admin to end the quiz.', 'success');
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '✅ Submit All Answers';
      }
    }
  </script>
</body>
</html>
